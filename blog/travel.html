<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Travel Diaries - Journeys and landscapes experienced by Shichao Zhai">
    <title>Travel Diaries - Shichao Zhai</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/buttons.css">
    <link rel="stylesheet" href="assets/css/blog-base.css">
    <link rel="stylesheet" href="assets/css/blog-section.css">
</head>
<body>

    <nav class="blog-nav">
        <div class="blog-nav-left">
            <a href="../index.html" class="btn-back" data-i18n="blog.back">← Back to Homepage</a>
        </div>
        <div class="blog-nav-center">
            <a href="reading.html" class="blog-nav-tab" data-i18n="blog.tab.reading">Reading Notes</a>
            <a href="travel.html" class="blog-nav-tab active" data-i18n="blog.tab.travel">Travel Diaries</a>
            <a href="daily.html" class="blog-nav-tab" data-i18n="blog.tab.daily">Daily Life</a>
        </div>
        <div class="blog-nav-right">
            <button id="lang-toggle" class="lang-btn" aria-label="Toggle language">EN</button>
            <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme">🌙</button>
        </div>
    </nav>

    <main class="blog-content">
        <div class="blog-section-header">
            <h1>🏔️ <span data-i18n="blog.travel">Travel Diaries</span></h1>
            <p data-i18n="blog.travel.desc">Travel journals, landscape photography, videos, and stories from the road.</p>
        </div>

        <div id="posts-container" class="article-list"></div>

        <!-- Lightbox overlays -->
        <div id="lightbox-img1" class="lightbox-overlay">
            <a href="#" class="lightbox-close">&times;</a>
            <img src="imgs/huangshan-1.jpg" alt="Huangshan sunrise" onerror="this.style.display='none'">
        </div>
        <div id="lightbox-img2" class="lightbox-overlay">
            <a href="#" class="lightbox-close">&times;</a>
            <img src="imgs/huangshan-2.jpg" alt="Cloud sea view" onerror="this.style.display='none'">
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="../assets/js/i18n.js"></script>
    <script src="../assets/js/theme.js"></script>
    <script src="assets/js/posts.js"></script>
    <script src="assets/js/blog-render.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            initI18N();

            const galleryHtml = `
                <a href="#lightbox-img1"><img src="imgs/huangshan-1.jpg" alt="Huangshan sunrise" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22300%22><rect fill=%22%23e0e4e8%22 width=%22400%22 height=%22300%22/><text x=%22200%22 y=%22155%22 text-anchor=%22middle%22 fill=%22%23999%22>🏔️ Sunrise</text></svg>'"></a>
                <a href="#lightbox-img2"><img src="imgs/huangshan-2.jpg" alt="Cloud sea view" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22300%22><rect fill=%22%23e0e4e8%22 width=%22400%22 height=%22300%22/><text x=%22200%22 y=%22155%22 text-anchor=%22middle%22 fill=%22%23999%22>☁️ Cloud Sea</text></svg>'"></a>
            `;

            const videoHtml = `
                <video controls preload="metadata" poster="imgs/suzhou-poster.jpg" style="width:100%;">
                    <source src="videos/suzhou-gardens.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            `;

            const audioHtml = `
                <p style="font-size:var(--font-size-sm);color:var(--color-text-secondary);margin-bottom:var(--spacing-sm);">
                    <i class="fas fa-headphones"></i> Ambient recording — Lakeside at sunset
                </p>
                <audio controls preload="none" style="width:100%;">
                    <source src="videos/taihu-ambient.mp3" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            `;

            /* Attach media to specific posts */
            const postsWithMedia = travelPosts.map(p => {
                if (p.hasGallery) return { ...p, galleryHtml };
                if (p.hasVideo) return { ...p, videoHtml };
                if (p.hasAudio) return { ...p, audioHtml };
                return p;
            });

            renderPosts(postsWithMedia, 'posts-container', { isTravel: true });
        });
    </script>
</body>
</html>
